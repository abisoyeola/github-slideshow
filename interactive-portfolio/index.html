<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Idris Abass Interactive Portfolio</title><style>*{box-sizing:border-box}body{margin:0;overflow:hidden;background:#071713;color:#f2fff9;font-family:Inter,Arial,sans-serif}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;left:22px;top:20px;z-index:2;max-width:410px;background:rgba(7,23,19,.72);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(14px);border-radius:24px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.35)}.hud h1{font-size:28px;line-height:1;margin:0 0 8px}.hud p{margin:0;color:#bdd4ce}.tag{color:#34e6b3;text-transform:uppercase;letter-spacing:.15em;font-size:11px;font-weight:900}.controls{position:fixed;right:22px;bottom:20px;background:rgba(7,23,19,.72);border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:14px 16px;color:#bdd4ce}.panel{position:fixed;right:22px;top:20px;z-index:3;width:min(430px,calc(100vw - 44px));background:rgba(8,32,27,.92);border:1px solid rgba(255,255,255,.16);border-radius:28px;padding:24px;box-shadow:0 30px 100px rgba(0,0,0,.48);display:none}.panel.show{display:block}.panel h2{margin:0 0 12px;font-size:30px}.panel p{color:#bdd4ce}.panel a{display:inline-block;margin-top:12px;background:#34e6b3;color:#05211c;padding:12px 16px;border-radius:999px;text-decoration:none;font-weight:900}.close{float:right;background:transparent;border:0;color:#fff;font-size:28px;cursor:pointer}.mobile{display:none}@media(max-width:760px){.hud{left:12px;right:12px;top:12px}.controls{left:12px;right:12px}.hud h1{font-size:22px}}</style></head><body><canvas id="world"></canvas><div class="hud"><p class="tag">Interactive tech world</p><h1>Idris Abass</h1><p>Drive around the portfolio. Visit the glowing zones to explore Backend, Cloud, DevOps, Data, Mobile and Leadership.</p></div><div class="controls">Use arrow keys or WASD. On mobile, drag on the screen.</div><section class="panel" id="panel"><button class="close" onclick="panel.classList.remove('show')">×</button><h2 id="pt"></h2><p id="pd"></p><a id="pl" href="https://github.com/abisoyeola" target="_blank">Open link</a></section><script>const c=document.getElementById('world'),x=c.getContext('2d'),panel=document.getElementById('panel'),pt=document.getElementById('pt'),pd=document.getElementById('pd'),pl=document.getElementById('pl');let w,h,keys={},car={x:0,y:0,a:-.5,s:0};const zones=[['Backend Engineering','REST APIs, microservices, SaaS platforms, FastAPI, Django, C#, Java, Spring Boot, PHP and Go.',-520,-300,'https://github.com/abisoyeola'],['Cloud Architecture','AWS, Azure, GCP, IAM, serverless thinking, high availability and cloud-ready deployments.',430,-320,'https://github.com/abisoyeola'],['DevOps Delivery','Docker, Kubernetes, Jenkins, GitHub Actions, GitLab CI/CD, Terraform, Ansible, Linux and Nginx.',-430,260,'https://github.com/abisoyeola'],['Data and BI','SQL Server, PostgreSQL, MySQL, MongoDB, Redis, Tableau, Excel, SSIS and analytics dashboards.',470,270,'https://github.com/abisoyeola'],['Mobile and Frontend','Flutter, Dart, Kotlin, Android, JavaScript and practical product interface delivery.',0,430,'https://github.com/abisoyeola'],['Technical Leadership','Mentoring, code reviews, documentation, debugging, deployment support and distributed team delivery.',0,-20,'https://www.linkedin.com/in/idris-a-ab953789/']];function size(){w=c.width=innerWidth*devicePixelRatio;h=c.height=innerHeight*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}addEventListener('resize',size);size();addEventListener('keydown',e=>keys[e.key.toLowerCase()]=1);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);let drag=false,last=null;addEventListener('pointerdown',e=>{drag=true;last=e.clientX});addEventListener('pointerup',()=>drag=false);addEventListener('pointermove',e=>{if(drag){car.a+=(e.clientX-last)*.006;car.s=.9;last=e.clientX}});function show(z){pt.textContent=z[0];pd.textContent=z[1];pl.href=z[4];panel.classList.add('show')}function draw(){requestAnimationFrame(draw);if(keys.arrowleft||keys.a)car.a-=.055;if(keys.arrowright||keys.d)car.a+=.055;if(keys.arrowup||keys.w)car.s=Math.min(5,car.s+.16);else if(keys.arrowdown||keys.s)car.s=Math.max(-2,car.s-.12);else car.s*=.96;car.x+=Math.cos(car.a)*car.s;car.y+=Math.sin(car.a)*car.s;x.clearRect(0,0,w,h);x.save();x.translate(innerWidth/2-car.x,innerHeight/2-car.y);for(let i=-1200;i<=1200;i+=80){x.strokeStyle='rgba(255,255,255,.045)';x.beginPath();x.moveTo(i,-1200);x.lineTo(i,1200);x.moveTo(-1200,i);x.lineTo(1200,i);x.stroke()}x.fillStyle='#0c2b25';x.fillRect(-900,-700,1800,1400);x.strokeStyle='rgba(52,230,179,.25)';x.lineWidth=6;x.strokeRect(-880,-680,1760,1360);zones.forEach(z=>{let d=Math.hypot(car.x-z[2],car.y-z[3]);x.save();x.translate(z[2],z[3]);x.fillStyle=d<110?'rgba(52,230,179,.38)':'rgba(52,230,179,.18)';x.beginPath();x.arc(0,0,95,0,7);x.fill();x.strokeStyle='#34e6b3';x.lineWidth=3;x.stroke();x.fillStyle='#f2fff9';x.font='bold 22px Arial';x.textAlign='center';x.fillText(z[0],0,8);x.restore();if(d<78&&!panel.classList.contains('show'))show(z)});x.save();x.translate(car.x,car.y);x.rotate(car.a);x.fillStyle='#34e6b3';x.fillRect(-32,-18,64,36);x.fillStyle='#061713';x.fillRect(4,-12,18,24);x.fillStyle='#fff';x.fillRect(-18,-24,18,8);x.fillRect(-18,16,18,8);x.restore();x.restore()}draw()</script></body></html>
